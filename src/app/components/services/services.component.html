<section class="services" id="services">
  <div class="container">

    <h2 class="services__title">{{ t().h2 }}</h2>
    <p class="services__sub text-muted">{{ t().sub }}</p>

    <div class="services__grid">
      @for (card of t().cards; track card.title; let i = $index) {
        <article class="service-card">

          <span
            class="service-card__label"
            [class.service-card__label--secondary]="i > 0"
          >{{ card.label }}</span>

          <div class="service-card__header">
            <h3 class="service-card__title">{{ card.title }}</h3>
            <p class="service-card__price">{{ card.price }}</p>
          </div>

          <p class="service-card__for">{{ card.for }}</p>

          <ul class="service-card__features">
            @for (f of card.features; track f) {
              <li>
                <span class="service-card__check" aria-hidden="true">✓</span>
                {{ f }}
              </li>
            }
          </ul>

          <a href="#contact" class="btn btn--outline service-card__cta">{{ card.cta }}</a>

        </article>
      }
    </div>

  </div>
</section>
