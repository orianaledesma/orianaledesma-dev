<section class="hero" id="hero">
  <div class="hero__grid-bg" aria-hidden="true"></div>

  <div class="container hero__container">

    <!-- LEFT: Text content -->
    <div class="hero__content">

      <span class="badge">
        <span class="badge__dot" aria-hidden="true"></span>
        <span>{{ t().badge }}</span>
      </span>

      <h1 class="hero__headline">{{ t().h1 }}</h1>

      <p class="hero__subheadline">{{ t().subheadline }}</p>

      <div class="hero__actions">
        <a href="#services" class="btn btn--primary">{{ t().ctaPrimary }}</a>
        <a
          [href]="calendlyUrl"
          target="_blank"
          rel="noopener"
          class="btn btn--outline"
          [attr.aria-label]="t().ctaSecondary + ', opens in new tab'"
        >{{ t().ctaSecondary }}</a>
      </div>

      <p class="hero__tagline">{{ t().tagline }}</p>

    </div>

    <!-- RIGHT: Photo -->
    <div class="hero__photo-wrap">
      <div class="hero__photo-placeholder">
        <img
          src="assets/images/profile/hero.png"
          alt="Oriana Ledesma — Frontend Engineer"
          class="hero__photo-img"
          width="420"
          height="520"
          loading="eager"
          fetchpriority="high"
        />
      </div>
      <div class="hero__photo-glow" aria-hidden="true"></div>
    </div>

  </div>
</section>
