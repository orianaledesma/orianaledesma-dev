<section class="faq" id="faq">
  <div class="container faq__container">

    <div class="faq__header">
      <span class="section-label">FAQ</span>
      <h2>{{ t().h2 }}</h2>
    </div>

    <div class="faq__list">
      @for (item of t().items; track item.question; let i = $index) {
        <div class="faq-item" [class.faq-item--open]="openIndex() === i">
          <button
            class="faq-item__question"
            [id]="'faq-btn-' + i"
            [attr.aria-expanded]="openIndex() === i"
            [attr.aria-controls]="'faq-panel-' + i"
            (click)="toggle(i)"
          >
            <span>{{ item.question }}</span>
            <span class="faq-item__icon" aria-hidden="true">{{ openIndex() === i ? '−' : '+' }}</span>
          </button>

          <div
            role="region"
            class="faq-item__answer"
            [id]="'faq-panel-' + i"
            [attr.aria-labelledby]="'faq-btn-' + i"
          >
            <div class="faq-item__answer-inner">
              <p>{{ item.answer }}</p>
            </div>
          </div>
        </div>
      }
    </div>

  </div>
</section>
