<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>OG Image — Oriana Ledesma</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;900&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 1200px;
    height: 630px;
    overflow: hidden;
    font-family: 'Poppins', sans-serif;
    background: #0b1628;
    color: #dde8f5;
    -webkit-font-smoothing: antialiased;
  }

  .canvas {
    position: relative;
    width: 1200px;
    height: 630px;
    padding: 40px 80px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    background:
      radial-gradient(ellipse 800px 500px at 100% 0%, rgba(94, 234, 212, 0.18), transparent 60%),
      radial-gradient(ellipse 600px 400px at 0% 100%, rgba(94, 234, 212, 0.08), transparent 60%),
      linear-gradient(135deg, #0b1628 0%, #111f38 100%);
  }

  .grid {
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(rgba(94, 234, 212, 0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(94, 234, 212, 0.04) 1px, transparent 1px);
    background-size: 60px 60px;
    pointer-events: none;
  }

  .top {
    display: flex;
    align-items: center;
    gap: 16px;
    z-index: 1;
  }

  .dot {
    width: 12px;
    height: 12px;
    border-radius: 50%;
    background: #5eead4;
    box-shadow: 0 0 24px #5eead4;
  }

  .eyebrow {
    font-size: 18px;
    font-weight: 600;
    letter-spacing: 4px;
    color: #5eead4;
    text-transform: uppercase;
  }

  .main {
    z-index: 1;
  }

  .name {
    font-size: 80px;
    font-weight: 900;
    line-height: 1;
    letter-spacing: -3px;
    color: #ffffff;
    margin-bottom: 20px;
  }

  .role {
    font-size: 28px;
    font-weight: 400;
    line-height: 1.3;
    color: #dde8f5;
    max-width: 900px;
  }

  .role strong {
    color: #5eead4;
    font-weight: 600;
  }

  .bottom {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    z-index: 1;
  }

  .case {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .case-label {
    font-size: 14px;
    font-weight: 500;
    letter-spacing: 2px;
    color: #7a9cbf;
    text-transform: uppercase;
  }

  .case-name {
    font-size: 20px;
    font-weight: 600;
    color: #dde8f5;
  }

  .case-name span {
    color: #5eead4;
  }

  .url {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 20px;
    font-weight: 600;
    color: #5eead4;
    padding: 12px 20px;
    border: 1.5px solid rgba(94, 234, 212, 0.4);
    border-radius: 100px;
    background: rgba(94, 234, 212, 0.06);
  }

  .url::before {
    content: "";
    display: inline-block;
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: #5eead4;
    box-shadow: 0 0 12px #5eead4;
  }
</style>
</head>
<body>
  <div class="canvas">
    <div class="grid"></div>

    <div class="top">
      <span class="dot"></span>
      <span class="eyebrow">Available for projects · EU timezone</span>
    </div>

    <div class="main">
      <h1 class="name">Oriana Ledesma</h1>
      <p class="role">Senior <strong>Angular Engineer</strong> &amp; <strong>Travel-Tech Builder</strong>. 5+ years shipping production frontends.</p>
    </div>

    <div class="bottom">
      <div class="case">
        <span class="case-label">Live case study</span>
        <span class="case-name">Exploriando<span> · </span>built from zero</span>
      </div>
      <div class="url">orianaledesma.dev</div>
    </div>
  </div>
</body>
</html>
